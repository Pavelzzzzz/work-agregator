apiVersion: apps/v1
kind: Deployment
metadata:
  name: vacancy-scout-redis
  namespace: vacancy-scout
  labels:
    app.kubernetes.io/part-of: vacancy-scout
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vacancy-scout-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vacancy-scout-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vacancy-scout-redis
  namespace: vacancy-scout
  labels:
    app.kubernetes.io/part-of: vacancy-scout
    app.kubernetes.io/component: cache
spec:
  selector:
    app.kubernetes.io/name: vacancy-scout-redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
