apiVersion: apps/v1
kind: Deployment
metadata:
  name: vacancy-scout-frontend
  namespace: vacancy-scout
  labels:
    app.kubernetes.io/part-of: vacancy-scout
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vacancy-scout-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vacancy-scout-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: vacancy-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vacancy-scout-frontend
  namespace: vacancy-scout
  labels:
    app.kubernetes.io/part-of: vacancy-scout
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: vacancy-scout-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
