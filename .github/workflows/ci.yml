name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: vacancy_scout
          POSTGRES_PASSWORD: vacancy_scout
          POSTGRES_DB: vacancy_scout
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/**.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Lint backend (Spotless)
        run: ./gradlew :backend:spotlessCheck
      - name: Lint backend (Checkstyle)
        run: ./gradlew :backend:checkstyleMain
      - name: Lint backend (PMD)
        run: ./gradlew :backend:pmdMain
      - name: Build backend
        run: ./gradlew :backend:build -x spotlessCheck -x checkstyleMain -x pmdMain
      - name: Build frontend (npm)
        working-directory: ./frontend
        run: |
          node --version
          npm --version
          npm ci
          npm run build
      - name: Lint frontend (ESLint)
        working-directory: ./frontend
        run: npm run lint
      - name: Lint frontend (Prettier)
        working-directory: ./frontend
        run: npm run format
      - name: Run tests (backend)
        run: ./gradlew :backend:test
      - name: Liquibase migrations (validate changelogs)
        run: ./gradlew :backend:liquibaseValidate
      - name: Generate Jacoco report
        run: ./gradlew :backend:jacocoTestReport
