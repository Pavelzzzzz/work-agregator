spring:
  autoconfigure:
    exclude: org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  application:
    name: vacancy-scout
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/vacancy_scout
    username: vacancy_scout
    password: ${DB_PASSWORD}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/vacancy_scout
    username: vacancy_scout
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  liquibase:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/vacancy_scout
    user: vacancy_scout
    password: ${DB_PASSWORD}
    change-log: classpath:db/changelog/db.changelog-master.xml
  main:
    web-application-type: reactive

rabota:
  rss:
    base-url: https://rabota.by
    area: 16
    queries: java,python,javascript,frontend,backend,devops,qa,data scientist,golang,kotlin,swift,flutter,react,vue,angular,php,scala,rust,typescript,product manager,business analyst,system administrator,network engineer,security,designer,machine learning
    fetch-interval-ms: 3600000

server:
  port: 8080
