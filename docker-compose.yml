services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vacancy-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - DB_PASSWORD=vacancy_scout
      - REDIS_HOST=redis
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vacancy-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: vacancy_scout
      POSTGRES_PASSWORD: vacancy_scout
      POSTGRES_DB: vacancy_scout
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  postgres_data:
    driver: local
